<!DOCTYPE html>
<html>
<head>

<title>Chat Room</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-dark text-white">

<div class="container mt-4">

<h2 class="text-center mb-3">🔐 Encrypted Chat Room</h2>

<!-- 👑 ADMIN INFO -->
<div id="admin-info" class="text-warning text-center mb-3"></div>

<div class="row">

    <!-- 👥 USER LIST -->
    <div class="col-md-3">

        <h5 class="text-info">Users</h5>
        <ul id="users" class="list-group mb-3"></ul>

    </div>

    <!-- 💬 CHAT AREA -->
    <div class="col-md-9">

        <div id="messages" class="chat-box"></div>

        <div class="input-group mt-3">
            <input id="messageInput" class="form-control form-control-lg">
            <button onclick="sendMessage()" class="btn btn-success">
                Send
            </button>
        </div>

    </div>

</div>

<a href="index.html" class="btn btn-danger mt-3">
Exit Room
</a>

</div>

<script src="js/main.js"></script>

</body>
</html>
